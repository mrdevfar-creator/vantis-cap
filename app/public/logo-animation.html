<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantis Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #060608;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 700px;
    height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ── AMBIENT RADIAL GLOW ── */
  .ambient {
    position: absolute;
    width: 600px;
    height: 340px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -62%);
    background: radial-gradient(ellipse 70% 60% at 50% 50%,
      rgba(240,185,11,0.18) 0%,
      rgba(240,185,11,0.07) 40%,
      transparent 70%);
    opacity: 0;
    animation: ambientIn 1.4s ease-out 0.4s forwards;
    pointer-events: none;
    border-radius: 50%;
    filter: blur(2px);
  }

  /* ── WINGS IMAGE ── */
  .wings {
    position: relative;
    width: 400px;
    height: auto;
    opacity: 0;
    transform: scale(0.88) translateY(10px);
    animation: wingsIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    z-index: 2;
    /* Gold tint filter */
    filter:
      drop-shadow(0 0 28px rgba(240,185,11,0.95))
      drop-shadow(0 0 60px rgba(240,185,11,0.5))
      drop-shadow(0 0 100px rgba(240,185,11,0.25));
  }

  .wings img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Shimmer sweep over wings */
  .wings-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg,
      transparent 30%,
      rgba(255,255,255,0.35) 50%,
      transparent 70%);
    opacity: 0;
    animation: shimmerSweep 0.9s ease-in-out 2.1s forwards;
    pointer-events: none;
    border-radius: 4px;
  }

  /* ── DIVIDER ── */
  .line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(240,185,11,0.4) 20%,
      #F0B90B 50%,
      rgba(240,185,11,0.4) 80%,
      transparent 100%);
    margin: 20px 0 18px;
    opacity: 0;
    box-shadow: 0 0 12px rgba(240,185,11,0.7), 0 0 24px rgba(240,185,11,0.3);
    animation: lineGrow 0.55s cubic-bezier(0.77, 0, 0.18, 1) 2.0s forwards;
  }

  /* ── VANTIS ── */
  .vantis {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 22px;
    color: #FFFFFF;
    line-height: 1;
    opacity: 0;
    clip-path: inset(0 100% 0 0);
    animation: revealRight 0.65s cubic-bezier(0.77, 0, 0.18, 1) 2.15s forwards;
    text-shadow:
      0 0 40px rgba(255,255,255,0.08),
      0 2px 0 rgba(0,0,0,0.6);
    position: relative;
    z-index: 2;
  }

  /* ── CAPITAL ── */
  .capital {
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 16px;
    color: #F0B90B;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(14px);
    animation: capitalUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 2.7s forwards;
    text-shadow: 0 0 20px rgba(240,185,11,0.6), 0 0 40px rgba(240,185,11,0.2);
    position: relative;
    z-index: 2;
    margin-left: 16px; /* compensate letter-spacing */
  }

  /* ── CORNER BRACKETS ── */
  .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    opacity: 0;
    animation: cornerIn 0.5s ease 3.0s forwards;
  }
  .tl { top: 18px; left: 18px; border-top: 1.5px solid rgba(240,185,11,0.55); border-left: 1.5px solid rgba(240,185,11,0.55); }
  .tr { top: 18px; right: 18px; border-top: 1.5px solid rgba(240,185,11,0.55); border-right: 1.5px solid rgba(240,185,11,0.55); }
  .bl { bottom: 18px; left: 18px; border-bottom: 1.5px solid rgba(240,185,11,0.55); border-left: 1.5px solid rgba(240,185,11,0.55); }
  .br { bottom: 18px; right: 18px; border-bottom: 1.5px solid rgba(240,185,11,0.55); border-right: 1.5px solid rgba(240,185,11,0.55); }

  /* ── REPLAY ── */
  .replay {
    position: fixed;
    bottom: 28px; right: 28px;
    background: transparent;
    border: 1px solid rgba(240,185,11,0.35);
    color: rgba(240,185,11,0.8);
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 9px 22px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s;
    animation: cornerIn 0.4s ease 3.3s forwards;
  }
  .replay:hover {
    background: rgba(240,185,11,0.08);
    border-color: rgba(240,185,11,0.8);
    color: #F0B90B;
    box-shadow: 0 0 24px rgba(240,185,11,0.15);
  }

  /* ════ KEYFRAMES ════ */
  @keyframes ambientIn {
    0%   { opacity: 0; transform: translate(-50%, -62%) scale(0.6); }
    60%  { opacity: 1; }
    100% { opacity: 0.85; }
  }

  @keyframes wingsIn {
    0%   { opacity: 0; transform: scale(0.82) translateY(16px); filter: drop-shadow(0 0 60px rgba(240,185,11,1)) drop-shadow(0 0 120px rgba(240,185,11,0.7)) brightness(2.5) blur(6px); }
    45%  { opacity: 1; filter: drop-shadow(0 0 40px rgba(240,185,11,0.9)) drop-shadow(0 0 80px rgba(240,185,11,0.4)) brightness(1.6) blur(1px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: drop-shadow(0 0 28px rgba(240,185,11,0.95)) drop-shadow(0 0 60px rgba(240,185,11,0.5)) drop-shadow(0 0 100px rgba(240,185,11,0.25)) brightness(1); }
  }

  @keyframes shimmerSweep {
    0%   { opacity: 0; transform: translateX(-120%); }
    15%  { opacity: 1; }
    85%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateX(120%); }
  }

  @keyframes lineGrow {
    0%   { width: 0; opacity: 0; }
    20%  { opacity: 1; }
    100% { width: 320px; opacity: 1; }
  }

  @keyframes revealRight {
    0%   { opacity: 1; clip-path: inset(0 100% 0 0); }
    100% { opacity: 1; clip-path: inset(0 0% 0 0); }
  }

  @keyframes capitalUp {
    0%   { opacity: 0; transform: translateY(14px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes cornerIn {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
